<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-logo">
        <img
          src="https://www.pngmart.com/files/23/Amazon-Logo-White-PNG-Isolated-HD.png"
          alt="logo"
        />
      </div>
      <div class="region">
        <span class="r1">Deliver to</span> <br />
        <span class="r2"><i class="fa-solid fa-location-dot"></i>Nepal</span>
      </div>

      <div class="search">
        <div class="search-all">
          <select name="select" id="search-select">
            <option value="All">All</option>
            <option value="Art & Crafts">Art & Crafts</option>
            <option value="Automotive">Automotive</option>
            <option value="Baby">Baby</option>
            <option value="Books">Books</option>
          </select>
        </div>
        <input type="text" placeholder="Search" />
        <div class="search-logo">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </div>

      <div class="account">
        <i class="fa-regular fa-user"></i> <br />Account
      </div>
      <div class="cart">
        <i class="fa-solid fa-cart-arrow-down"></i><br />Cart
      </div>
    </header>
    <nav>
      <ul class="nav-ul">
        <li>
          <a href="#"><i class="fa-solid fa-bars"></i> All</a>
        </li>
        <li><a href="#">Today's Deals</a></li>
        <li><a href="#">Prime Video</a></li>
        <li><a href="#">Registry</a></li>
        <li><a href="#">Gift Cards</a></li>
        <li><a href="#">Customer Service</a></li>
        <li><a href="#">Sell</a></li>
      </ul>
    </nav>
  </body>
</html>
